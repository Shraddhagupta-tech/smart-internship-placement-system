<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application</title>
</head>
<body>
    <form method="POST">
    <h1>Apply for Internship</h1>
    <label for="student_id">Student ID:</label><br>
    <input type="text" name="student_id" id="student_id" placeholder="Enter your student id"><br><br>
    <label for="internship_id">Internship ID:</label><br>
    <input type="text" name="internship_id" id="internship_id" placeholder="Enter internship id"><br><br>
    <input type="submit" value="submit">
    </form>
    {% with messages=get_flashed_messages(with_categories=true)%}
    {% if messages %}
    {% for category,msg in messages %}
    <div style="color: green; font-weight: bold;">
        {{msg}}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}
</body>
</html>
